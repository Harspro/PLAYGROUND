      AM0A_REC: TSYS_PCB_MC_ACCTMASTER_DAILY_AM0A_REC
      AM04_PD: TSYS_PCB_MC_ACCTMASTER_DAILY_AM04_PD
      AM08_REC: TSYS_PCB_MC_ACCTMASTER_DAILY_AM08_REC
      AM0F_REC: TSYS_PCB_MC_ACCTMASTER_DAILY_AM0F_REC
      AM0BR_REC: TSYS_PCB_MC_ACCTMASTER_DAILY_AM0BR_REC
