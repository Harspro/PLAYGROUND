    add_columns:
      - CURRENT_TIMESTAMP() AS REC_LOAD_TIMESTAMP
      - CURRENT_DATETIME('America/Toronto') AS inserted_at
    keep_previous_table: true
    partition_field:  RANGE_BUCKET(AM00_APPLICATION_SUFFIX, GENERATE_ARRAY(0, 1000, 1))
    clustering_fields:
      - MAST_ACCOUNT_ID
    layouts_to_bq_table:
      AM00_REC: TSYS_PCB_MC_ACCTMASTER_DAILY_AM00_REC
      AM01_REC: TSYS_PCB_MC_ACCTMASTER_DAILY_AM01_REC
      AM02_REC: TSYS_PCB_MC_ACCTMASTER_DAILY_AM02_REC
