# Config file for all TSYS related dags
TS2_acctscores:
  job_size: small
  processing_bucket: pcb-{env}-staging
  processing_bucket_config: pcb-{env}-staging-artifacts
  processing_bucket_extract: pcb-{env}-staging-extract
  spark_delta_job:
    file_uris:
      - gs://pcb-{env}-staging-artifacts/resources/tsys-batch-delta/application.conf
      - gs://pcb-{env}-staging-artifacts/resources/tsys-batch-delta/kafka.jks
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/tsys-batch-delta-2.0.0.jar
      - gs://pcb-{env}-staging-artifacts/jarfiles/ledger-spark-batch-2.0.0.jar
    main_class: com.pcb.batch.tsysdeltagenerator.TsysDeltaGenerationApp
    segment_args:
      - configFilePath: application.conf
        currentDayFilesPath: _tempplaceholder
        previousDayFilesPath: _tempplaceholder
        segment: _tempplaceholder
    bq_dataset_id: AccountScoresDataset
    application_suffix: 0
    segments_to_process:
      - SC01
  spark_filter_job:
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/tsys-spark-batch-2.0.0.jar
    main_class: com.pcb.batch.spark.tsys.TsysSparkBatchApplication
    segment_args:
      - pcb.tsys.processor.datafile.path: _tempplaceholder
        pcb.tsys.processor.datafile.type: account_score
        pcb.tsys.processor.filtering: "true"
  spark_parse_job:
    common_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      pcb.tsys.processor.datafile.type: account_score
      pcb.tsys.processor.output.format: parquet
      pcb.tsys.processor.output.path: _tempplaceholder
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/tsys-spark-batch-2.0.0.jar
    main_class: com.pcb.batch.spark.tsys.TsysSparkBatchApplication
    segment_args:
      - pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/TS2_acctscores/MSTSCOR_SC01.CPY
        pcb.tsys.processor.layout.name: SC01_REC
        pcb.tsys.processor.segment.name: SC01
  bigquery:
    project_id: pcb-{env}-landing
    dataset_id: domain_account_management
    ext_table_layout_prefix: TS2_ACCTSCORES
    data_load_type: FULL_REFRESH
    add_columns:
      - CURRENT_TIMESTAMP() AS REC_LOAD_TIMESTAMP
      - CURRENT_DATETIME('America/Toronto') AS inserted_at
    keep_previous_table: true
    layouts_to_bq_table:
      SC01_REC: TS2_ACCTSCORES_SC01_REC
  default_args:
    owner: "team-digital-adoption-alerts"
    capability: "account-management"
    sub_capability: "account-management"
    business_impact: "TBD"
    customer_impact: "TBD"
    severity: "P3"

TS2_rptrec:
  job_size: small
