# This file has the landing bucket folder -> DAG mappings
# Used to determine which DAG to trigger based on the bucket folder name
#
# folder_name: The exact folder name in GCS landing bucket.
# filename_pattern: The filename has to match regex. If not, it is a no-op.
# dags_to_trigger: The names of DAGs to trigger. Usually only one.
#
# Add an entry here for a new DAG which processes a new file-type
#

- folder_name: letters_recon
  filename_pattern: ^psf_(p|t)_dst_pcb_(?!.*\.(gz|pgp)$).*$
  dags_to_trigger: [broadridge_doc_generation_recon_processing]

- folder_name: pcb_broadridge_returncff
  filename_pattern: ^psf_(t|p)_dst_pcb_returncff_(?!.*\.(gz|pgp)$).*$
  dags_to_trigger: [returncff_processing_orchestrator]
