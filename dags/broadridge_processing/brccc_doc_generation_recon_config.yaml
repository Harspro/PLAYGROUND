broadridge_doc_generation_recon_processing:
  tags:
    - communication
    - mail
  default_args:
    owner: "team-telegraphers-alerts"
    capability: "communication"
    sub_capability: "mail"
    severity: "P3"
    business_impact: "Ensures internal systems accurately reflect the status of mailed communications supporting reliable data flows to downstream processes."
    customer_impact: "Customers will not be able to receive paper communications in a timely manner. "
  dag:
    read_pause_deploy_config: True
    wait_for_completion: True
    poke_interval: 30
    file_extract_column_index: 6
    kafka_config:
      kafka_writer_task_id: trigger_mail_print_status_kafka_writer_dag
      kafka_trigger_dag_id: mail_print_status_kafka_writer
      kafka_cluster_name: "mail-print-status-events-c"
    bigquery:
      bucket: 'pcb-{env}-staging-extract'
      folder_prefix: 'document_generation'
      file_name: 'mail-print-status-*.parquet'
    trigger_config:
      bucket: "{{ dag_run.conf['bucket'] }}"
      name: "{{ dag_run.conf['name'] }}"
      folder_name: "{{ dag_run.conf['folder_name'] }}"
      file_name: "{{ dag_run.conf['file_name'] }}"