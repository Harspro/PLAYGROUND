cif_daily_bq_to_oracle:
  default_args:
    owner: "team-digital-adoption-alerts"
    capability: "account-management"
    sub_capability: "cif-daily"
    business_impact: "CIF processing will be delayed"
    customer_impact: "CIF processing will be delayed"
    severity: "P4"
  tags: [ "Digital Adoption - CIF DAILY" ]
  activity_name: cif_daily_processing
  interface_id: HO20
  sequence: TRUE
  bigquery:
    source_project_id: pcb-{env}-landing
    processing_project_id: pcb-{env}-processing
    destination_project_id: pcb-{env}-curated
    dataset_id: domain_account_management
  cluster_name: cif-daily-bq-to-oracle-c
  job_size: large
  segment_name: CIF_DAILY
  spark:
    update_jar_uri:
      - gs://pcb-{env}-staging-artifacts/jarfiles/bigquery-oracle-updater-2.0.0.jar
    file_uris:
      - gs://pcb-{env}-staging-artifacts/resources/bigquery-oracle-updater/application-ts2-db303.conf
    updater_main_class: com.pcb.batch.bigquerytooracleupdater.BigqueryToOracleUpdater
    application.config: "application-ts2-db303.conf"
    updater_job_args:
      CIF_ACCOUNT_CURR:
        oracle.schema.table.name: "TS2.CIF_ACCOUNT_CURR_BQ"
        operation.type: "merge"
        pcb.oracle.update.columns: "All"
        pcb.bigquery.loader.source.unique.key: "CIFP_ACCOUNT_ID5"
        pcb.oracle.dest.temp.table: "TS2.CIF_ACCOUNT_CURR_BQ_TEMP1"
      CIF_CARD_CURR:
        oracle.schema.table.name: "TS2.CIF_CARD_CURR_BQ"
        operation.type: "merge"
        pcb.oracle.update.columns: "All"
        pcb.bigquery.loader.source.unique.key: "CIFP_ACCOUNT_ID6,CIFP_ACCOUNT_NUM,CIFP_CUSTOMER_ID_2"
        pcb.oracle.dest.temp.table: "TS2.CIF_CARD_CURR_BQ_TEMP1"
      CIF_CARD_XREF:
        oracle.schema.table.name: "TS2.CIF_CARD_XREF"
        operation.type: "merge"
        pcb.oracle.update.columns: "All"
        pcb.bigquery.loader.source.unique.key: "CIFP_ACCOUNT_ID6,CIFP_ACCOUNT_NUM,CIFP_CUSTOMER_ID_2"
        pcb.oracle.dest.temp.table: "TS2.CIF_CARD_XREF_BQ_TEMP"
  enable_gcs_export: true
  gcs_export:
    bucket_name: "pcb-{env}-staging"
    file_format: "CSV"
    compression: "NONE"  # Must be NONE for merging files (GZIP cannot be composed with headers)
    field_delimiter: "|"
    include_header: false  # Export without headers (will be added during merge if needed)
    skip_oracle_segments:
      - CIF_CARD_CURR
      - CIF_ACCOUNT_CURR
    export_segments:
      - CIF_CARD_CURR
      - CIF_ACCOUNT_CURR
    segment_file_names:
      CIF_CARD_CURR:
        output_filename: "pcb_cif_card_curr"
        file_extension: "{file_env}"
        gcs_path: "cif_exports"
        header_file: "bq_to_oracle_loader/headers/cif_card_curr_header.csv"  # Required: path to fixed header file
      CIF_ACCOUNT_CURR:
        output_filename: "pcb_cif_account_curr"
        file_extension: "{file_env}"
        gcs_path: "cif_exports"
        header_file: "bq_to_oracle_loader/headers/cif_account_curr_header.csv"  # Required: path to fixed header file
    merge_sharded_files:  # Merge multiple sharded files into one
      enabled: true
      add_header: true  # Add header row from fixed header file (required if enabled)
    move_to_landing:
      enabled: true
      destination_bucket: mft-pcb-outbound{env_suffix}
      destination_folder: "pcb_cif_detail"

