alm_rbc_pcb_bonds_monthly_load:
  file:
    prefix: off-bal-sheet-bond-forward
    frequency: m
    format: parquet
    extension: "{file_env}"
  staging_bucket: pcb-{env}-staging-extract
  staging_folder: alm/rbc_pcb/bonds_forwards
  outbound_bucket: tbsm-outbound-pcb{env_suffix}
  outbound_folder: tbsm_outbound_alm
  inbound_bucket:  rbccm-inbound-pcb{env_suffix}
  inbound_folder: inbound_bonds
  bq_to_gcs_folder: alm/rbc_pcb/rbc_bonds_forwards
  bigquery:
    source_project_id: pcb-{env}-curated
    source_dataset_id: domain_account_management
    destination_project_id: pcb-{env}-curated
    destination_dataset_id: cots_alm_tbsm
    table_name: RBC_BONDS_FORWARDS
  inbound_file:
    format: csv
    skip_leading_rows: 0
    delimiter: "|"
    validation_file: validation_bond_rbc.yaml
    prefix: rbc_pcb_alm_bond_forwards
    schema_external:
      - {"name": "Trade_ID", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Previous_Trade_ID", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Trade_Date", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Effective_Date", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Maturity_Date", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Sub_Product", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Short_Name", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "BuySell", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Strike", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Pay", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Notional", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Pay_Index", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Pay_Rate", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Pay_Frequency", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Pay_CCY", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Receive", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Notional_2", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Receive_Index", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Receive_Rate", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Receive_Frequency", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Receive_CCY", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "Accrued_Interest_USD", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "MTM_USD", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "MTM_CAD", "type": "STRING", "mode": "NULLABLE"}
    data_mapping:
      column_map:
        ROW_TYPE: ' "BONDFORWARD" '
        Trade_ID: Trade_ID
        Counterparty: ' "RBCCM" '
        Bond_CUSIP: ' "" '
        Trade_date: CAST(Trade_Date AS DATE FORMAT 'MM/DD/YYYY')
        Settlement_date: ' "" '
        Forward_termination_date: ' "" '
        Forward_settlement_date: CAST(Maturity_Date AS DATE FORMAT 'MM/DD/YYYY')
        Contract_forward_price: ' "" '
        Face_amount: Notional
        Purpose_of_Bond_Forward: ' "" '
        MTM: MTM_CAD
        Currency: COALESCE(Pay_CCY,Receive_CCY)
        Sub_Product: Sub_Product
      data_filter:
        Sub_Product = 'Debt Forward'

