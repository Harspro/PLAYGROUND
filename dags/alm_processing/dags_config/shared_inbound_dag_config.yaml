alm_pcb_bond_monthly_load:
  file:
    prefix: "off-bal-sheet-bond-forward"
    frequency: m
    days_delta: 0
    format: parquet
    extension: "{file_env}"
  vendor:
    - treasury
  lowercase_vendor_name: vendor_name
  uppercase_vendor_name: VENDOR_NAME
  staging_bucket: pcb-{env}-staging-extract
  staging_folder: alm/{vendor_name}_pcb/{vendor_name}_bond
  outbound_bucket: tbsm-outbound-pcb{env_suffix}
  outbound_folder: tbsm_outbound_alm
  inbound_bucket: treasury-manual-inbound-pcb{env_suffix}
  inbound_folder: treasury_inbound_bonds
  bq_to_gcs_folder: alm/{vendor_name}_pcb/{vendor_name}_bond
  bigquery:
    source_project_id: pcb-{env}-curated
    source_dataset_id: domain_account_management
    destination_project_id: pcb-{env}-curated
    destination_dataset_id: cots_alm_tbsm
    table_name: "{VENDOR_NAME}_BOND"
  inbound_file:
    format: csv
    delimiter: ","
    validation_file: validation_bond_{vendor_name}.yaml
    prefix: "{vendor_name}_pcb_alm_bond_submit"
    schema_external:
      - {"name": "BOND_FORWARD", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "HEADER", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "SOURCE_VENDOR_CODE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "EMAIL_ID_OF_THE_SENDER", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "DATE_EMAIL_RECEIVED", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "NAME_OF_THE_SUBMITTER", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "THE_ORIGINAL_FIE_NAME", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "FROM_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "TO_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "REVISION_NUMBER", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "TRADE_ID", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "COUNTERPARTY", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "BOND_CUSIP", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "TRADE_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "SETTLEMENT_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "FORWARD_TERMINATION_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "FORWARD_SETTLEMENT_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "CONTRACT_FORWARD_PRICE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "FACE_AMOUNT", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "PURPOSE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "MTM", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "CURRENCY", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "PRODUCT", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "UNWIND_DATE", "type": "STRING", "mode": "NULLABLE"}
    data_mapping:
      column_map:
        ROW_TYPE: BOND_FORWARD
        TRADE_ID: TRADE_ID
        COUNTERPARTY: COUNTERPARTY
        BOND_CUSIP: BOND_CUSIP
        TRADE_DATE: COALESCE(SAFE.PARSE_DATE('%Y-%m-%d', TRADE_DATE), SAFE.PARSE_DATE('%m/%d/%Y', TRADE_DATE))
        SETTLEMENT_DATE: COALESCE(SAFE.PARSE_DATE('%Y-%m-%d', SETTLEMENT_DATE), SAFE.PARSE_DATE('%m/%d/%Y', SETTLEMENT_DATE))
        FORWARD_TERMINATION_DATE: COALESCE(SAFE.PARSE_DATE('%Y-%m-%d', FORWARD_TERMINATION_DATE), SAFE.PARSE_DATE('%m/%d/%Y', FORWARD_TERMINATION_DATE))
        FORWARD_SETTLEMENT_DATE:  COALESCE(SAFE.PARSE_DATE('%Y-%m-%d', FORWARD_SETTLEMENT_DATE), SAFE.PARSE_DATE('%m/%d/%Y', FORWARD_SETTLEMENT_DATE))
        CONTRACT_FORWARD_PRICE: CONTRACT_FORWARD_PRICE
        FACE_AMOUNT: FACE_AMOUNT
        PURPOSE: PURPOSE
        MTM: MTM
        CURRENCY: CURRENCY
        PRODUCT: PRODUCT
        UNWIND_DATE: UNWIND_DATE

