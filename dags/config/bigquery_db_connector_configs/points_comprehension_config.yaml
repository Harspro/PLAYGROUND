      "{table_pc_subscriptions}": "pcb-uat-landing.domain_loyalty.pc_subscriptions"
      "{table_pcx_hybris_orders}": "pcb-uat-landing.domain_loyalty.pcx_hybris_orders"
      "{table_sl_trans_qlfy_ecom_dly_full_history}": "pcb-uat-landing.domain_loyalty.sl_trans_qlfy_ecom_dly_full_history"
      "{table_ee_identity}": "pcb-uat-landing.domain_loyalty.ee_identity"
    prod:
