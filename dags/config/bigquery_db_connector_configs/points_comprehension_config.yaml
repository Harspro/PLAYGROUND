points_comprehension_monthly_sdm_in_store_purchase_bonus:
  default_args:
    owner: "team-convergence-alerts"
    capability: "Loyalty"
    severity: "P4"
    sub_capability: "Rewards/Loyalty"
    business_impact: "This dag loads the monthly sdm in store purchase bonus earn into Terminus which enables customers to track lifetime earn of PCF products"
    customer_impact: "In the event of a failure, the lifetime points tracking for customers will be delayed and missing most recent days data."
  bigquery:
    project_id: pcb-{env}-processing
    dataset_id: domain_loyalty
    table_id: points_comprehension_monthly_sdm_in_store_purchase_bonus_{current_date}
    query_file: loyalty_processing/points_comprehension/lcl_sdm_common/in_store/purchase_refund_bonus.sql
  env_specific_replacements: True
  replacements:
    common:
      "{tx_year_month_expr}": "SAFE_CAST(EXTRACT(YEAR FROM cnsld_latest.wallettransaction_trans_dt) AS INTEGER) AS tx_year,
                               SAFE_CAST(EXTRACT(MONTH FROM cnsld_latest.wallettransaction_trans_dt) AS INTEGER) AS tx_month,"
      "{loyalty_partner}": "SDM"
      "{earning_category}": "BN"
      "{transaction_type}": "PURCHASE"
      "{sum_condition}": " "
      "{create_user_id}": "MONTHLY_SDM_IN_STORE_BONUS"
      "{update_user_id}": "MONTHLY_SDM_IN_STORE_BONUS"
      "{inner_join_condition}": "cnsld_latest.wallettransactionid = ee_payment.wallettransactionid OR"
      "{cnsld_trans_dt_condition}": "cnsld_latest.trans_dt >= DATE_TRUNC(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH), MONTH)
                                     AND cnsld_latest.trans_dt < DATE_TRUNC(CURRENT_DATE(), MONTH)"
      "{eepayment_trans_dt_condition}": "ee_payment.trans_dt >= DATE_TRUNC(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH), MONTH)
                                         AND ee_payment.trans_dt < DATE_TRUNC(CURRENT_DATE(), MONTH)"
      "{wallettransaction_type_condition}": "in ('settle','return')"
      "{storeparentid_condition}": "sdm"
      "{reasoncode_condition}": "AND LOWER(cnsld_latest.accounttransactiondetailsentity_reasoncode) is null"
      "{event_condition}": "credit"
      "{tx_year_month}": "tx_year, tx_month,"
      "{points_earned_condition_1}": ">= 1"
      "{final_table_id}": "LOYALTY_POINTS_EARNED"
      "{tx_year_month_condition}": "AND T.TX_YEAR = S.TX_YEAR AND T.TX_MONTH = S.TX_MONTH"
      "{points_earned_condition_2}": ">"
      "{tx_year_month_column}": "TX_YEAR,  TX_MONTH,"
      "{tx_year_month_value}": "S.TX_YEAR, S.TX_MONTH,"
    dev:
      "{table_cnsld_latest}": "pcb-dev-landing.domain_loyalty.cnsld_ee_wallt_acct_tran_latst"
      "{table_ee_identity}": "pcb-dev-landing.domain_loyalty.ee_identity"
      "{table_ee_wallet_transaction_payment}": "pcb-dev-landing.domain_loyalty.ee_wallet_transaction_payment"
    uat:
      "{table_cnsld_latest}": "pcb-uat-landing.domain_loyalty.cnsld_ee_wallt_acct_tran_latst"
      "{table_ee_identity}": "pcb-uat-landing.domain_loyalty.ee_identity"
      "{table_ee_wallet_transaction_payment}": "pcb-uat-landing.domain_loyalty.ee_wallet_transaction_payment"
