points_comprehension_daily_esso_purchase_bonus:
  default_args:
    owner: "team-convergence-alerts"
    capability: "Loyalty"
    severity: "P4"
    sub_capability: "Rewards/Loyalty"
    business_impact: "This dag loads the daily esso purchase bonus earn into Terminus which enables customers to track lifetime earn of PCF products."
    customer_impact: "In the event of a failure, the lifetime points tracking for customers will be delayed and missing most recent days data."
  bigquery:
    project_id: pcb-{env}-processing
    dataset_id: domain_loyalty
    table_id: points_comprehension_daily_esso_purchase_bonus_{current_date}
    query_file: loyalty_processing/points_comprehension/esso/daily_esso_purchase_bonus.sql
  env_specific_replacements: True
  replacements:
    common:
      "{tx_year_month_expr}": "SAFE_CAST(EXTRACT(YEAR FROM cnsld_latest.wallettransaction_trans_dt) AS INTEGER) AS tx_year,
                              SAFE_CAST(EXTRACT(MONTH FROM cnsld_latest.wallettransaction_trans_dt) AS INTEGER) AS tx_month,"
      "{transaction_type}": "PURCHASE"
      "{sum_condition}": " "
      "{create_user_id}": "DAILY_ESSO_BONUS"
      "{update_user_id}": "DAILY_ESSO_BONUS"
      "{cnsld_inner_join_column}": "wallettransactionid"
      "{cnsld_trans_dt_condition}": "cnsld_latest.trans_dt >= DATE_TRUNC(CURRENT_DATE(), MONTH)
                                      AND cnsld_latest.trans_dt <= CURRENT_DATE()"
      "{eepayment_trans_dt_condition}": "ee_payment.trans_dt >= DATE_TRUNC(CURRENT_DATE(), MONTH)
                                      AND ee_payment.trans_dt <= CURRENT_DATE()"
      "{wallettransactiontype_condition}": "settle"
      "{event_condition}": "redeem"
      "{tx_year_month}": "tx_year, tx_month,"
      "{points_earned_condition}": ">= 1"
      "{final_table_id}": "LOYALTY_POINTS_EARNED"
      "{tx_year_month_condition}": "AND T.TX_YEAR = S.TX_YEAR AND T.TX_MONTH = S.TX_MONTH"
      "{merge_points_earned_condition}": ">"
      "{tx_year_month_column}": "TX_YEAR, TX_MONTH,"
      "{tx_year_month_value}": "S.TX_YEAR, S.TX_MONTH,"
    dev:
      "{table_cnsld_latest}": "pcb-dev-landing.domain_loyalty.cnsld_ee_wallt_acct_tran_latst"
      "{table_ee_identity}": "pcb-dev-landing.domain_loyalty.ee_identity"
      "{table_ee_wallet_transaction_payment}": "pcb-dev-landing.domain_loyalty.ee_wallet_transaction_payment"
    uat:
      "{table_cnsld_latest}": "pcb-uat-landing.domain_loyalty.cnsld_ee_wallt_acct_tran_latst"
      "{table_ee_identity}": "pcb-uat-landing.domain_loyalty.ee_identity"
      "{table_ee_wallet_transaction_payment}": "pcb-uat-landing.domain_loyalty.ee_wallet_transaction_payment"
    prod:
      "{table_cnsld_latest}": "lt-dia-lake-prd-consume.transactional_loyalty.cnsld_ee_wallt_acct_tran_latst"
      "{table_ee_identity}": "lt-dia-lake-prd-consume.transactional_loyalty.ee_identity"
      "{table_ee_wallet_transaction_payment}": "lt-dia-lake-prd-consume.transactional_loyalty.ee_wallet_transaction_payment"
  dag:
    read_pause_deploy_config: False
    tags: ["Loyalty"]
    schedule_interval: "0 22 * * *"

