points_comprehension_monthly_lcl_subscription_pcx_pass:
  default_args:
    owner: "team-convergence-alerts"
    capability: "Loyalty"
    severity: "P4"
    sub_capability: "Rewards/Loyalty"
    business_impact: "This dag loads the monthly lcl subscription pcx pass earn into Terminus which enables customers to track lifetime earn of PCF products"
    customer_impact: "In the event of a failure, the lifetime points tracking for customers will be delayed and missing most recent days data."
  bigquery:
    project_id: pcb-{env}-processing
    dataset_id: domain_loyalty
    table_id: points_comprehension_monthly_lcl_subscription_pcx_pass_{current_date}
    query_file: loyalty_processing/points_comprehension/lcl/subscription/pcx_pass.sql
  env_specific_replacements: True
  replacements:
    common:
      "{tx_year_month_expr}": "SAFE_CAST(EXTRACT(YEAR FROM VO.TRANSACTION_DT) AS INTEGER) AS tx_year,
                               SAFE_CAST(EXTRACT(MONTH FROM VO.TRANSACTION_DT) AS INTEGER) AS tx_month,"
      "{create_user_id}": "MONTHLY_LCL_SUBSCRIPTION_PCX_PASS"
      "{update_user_id}": "MONTHLY_LCL_SUBSCRIPTION_PCX_PASS"
      "{transaction_dt_condition}": "VO.TRANSACTION_DT >= DATE_TRUNC(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH), MONTH)
                                     AND VO.TRANSACTION_DT < DATE_TRUNC(CURRENT_DATE(), MONTH)"
      "{tx_year_month}": "tx_year, tx_month,"
      "{final_table_id}": "LOYALTY_SUBSCRIPTION_USAGE"
      "{tx_year_month_condition}": "AND T.TX_YEAR = S.TX_YEAR AND T.TX_MONTH = S.TX_MONTH"
      "{tx_year_month_column}": "TX_YEAR, TX_MONTH,"
      "{tx_year_month_value}": "S.TX_YEAR, S.TX_MONTH,"
    dev:
      "{table_helios_customers_all_lobs}": "pcb-dev-landing.domain_loyalty.helios_customers_all_lobs"
      "{table_pc_subscriptions}": "pcb-dev-landing.domain_loyalty.pc_subscriptions"
      "{table_pcx_hybris_orders}": "pcb-dev-landing.domain_loyalty.pcx_hybris_orders"
      "{table_sl_trans_qlfy_ecom_dly_full_history}": "pcb-dev-landing.domain_loyalty.sl_trans_qlfy_ecom_dly_full_history"
      "{table_ee_identity}": "pcb-dev-landing.domain_loyalty.ee_identity"
    uat:
