    conn_id: consent_postgres_connection
    conn_type: postgres
    description: "Consents Postgres Airflow Connection"
    dev:
      host: pcbdvs-pg-qa-auto.nonprod.pcfcloud.io
      login: consents_owner
      vault_password_secret_path: "/dev-secret/data/common/core-api/consents"
