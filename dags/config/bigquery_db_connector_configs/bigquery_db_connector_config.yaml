    select_fields:
      - signature_id
      - cnst_event_id
      - rec_create_tms
      - rec_chng_tms
      - rec_chng_id
      - document_id
    update_fields:
      - cnst_event_id
      - rec_create_tms
      - rec_chng_tms
      - rec_chng_id
      - document_id
    conflict_fields:
      - signature_id
