dnscnst_cnst_signature_db610_to_pg:
  default_args:
    owner: "team-Ogres"
    capability: "legal-compliance"
    severity: "P2"
    sub_capability: "consent"
    business_impact: "This will impact the compliance"
    customer_impact: "none"
  bigquery:
    project_id: pcb-{env}-processing
    dataset_id: domain_consent
    table_id: CNST_SIGNATURE_{current_date}
    query_file: tokenized_consent_capture/consents_sql/cnst_signature.sql
    batch_size: 10000
  postgres:
    postgres_conn_id: consent_postgres_connection
    target_table_id: public.cnst_signature
