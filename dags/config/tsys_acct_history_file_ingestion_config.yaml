tsys_pcb_mc_acct_hist_file_loading:
  job_size: small
  source_bucket: tsys-inbound-pcb
  processing_bucket: pcb-{env}-staging
  processing_bucket_config: pcb-{env}-staging-artifacts
  processing_bucket_extract: pcb-{env}-staging-extract
  file_prefix: tsys_pcb_mc_accthisto
  bigquery_oracle_loader_dag_id: acct_hist_bq_to_oracle
  file_date_column: FILE_CREATE_DT
  require_bigquery_oracle_loader: True
  trigger_flag: True
  spark:
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/tsys-spark-batch-2.0.0.jar
    main_class: com.pcb.batch.spark.tsys.TsysSparkBatchApplication
    filtering_job_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      pcb.tsys.processor.datafile.type: ACCOUNT_HISTORY
      pcb.tsys.processor.filtering: true
    parsing_job_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      pcb.tsys.processor.datafile.type: ACCOUNT_HISTORY
      pcb.tsys.processor.output.format: parquet
      pcb.tsys.processor.output.path: _tempplaceholder
    segment_dependency_groups:
      - group_name: trailer_group
        segments: TRLR
      - group_name: ah00_group
        segments: AH00
      - group_name: ah00_dependents_group
        segments: AH01, AH02_ADJ_PASTDUE, AH02_CHG_OFF, AH02_COLL_AGENCY, AH02_CREDLIM_CHG, AH02_DISPUTES, AH02_HIST_BKP, AH02_HIST_TYPE10, AH02_PTP, AH02_REAGE, AH02_REGZ
      - group_name: ah00_ah01_dependents_group
        segments: AH31, AH32, AH35
    segment_args:
      AH00:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH00.CPY
        pcb.tsys.processor.segment.name: AH00
        pcb.tsys.processor.layout.name: AH00_REC
      AH01:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH01.CPY
        pcb.tsys.processor.segment.name: AH01
        pcb.tsys.processor.layout.name: AH01_REC
      AH02_ADJ_PASTDUE:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH02_ADJ_PASTDUE.CPY
        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_ADJ_PASTDUE
      AH02_CHG_OFF:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH02_CHG_OFF.CPY
        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_CHG_OFF
      AH02_COLL_AGENCY:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH02_COLL_AGENCY.CPY
        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_COLL_AGENCY
      AH02_CREDLIM_CHG:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH02_CREDLIM_CHG.CPY
        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_CREDLIM_CHG
      AH02_DISPUTES:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH02_DISPUTES.CPY
        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_DISPUTES
      AH02_HIST_BKP:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH02_HIST_BKP.CPY
        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_HIST_BKP
      AH02_HIST_TYPE10:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH02_HIST_TYPE10.CPY
        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_HIST_TYPE10
      AH02_PTP:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH02_PTP.CPY
        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_PTP
      AH02_REAGE:
