        pcb.tsys.processor.segment.name: AH02
        pcb.tsys.processor.layout.name: AH02_REGZ
      AH31:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH31.CPY
        pcb.tsys.processor.segment.name: AH31
        pcb.tsys.processor.layout.name: AH31_REC
      AH32:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH32.CPY
        pcb.tsys.processor.segment.name: AH32
        pcb.tsys.processor.layout.name: AH32_REC
      AH35:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/MSTAHIST_AH35.CPY
        pcb.tsys.processor.segment.name: AH35
        pcb.tsys.processor.layout.name: AH35_REC
      TRLR:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_mc_accthistory/TRLR.CPY
        pcb.tsys.processor.segment.name: 9999
        pcb.tsys.processor.layout.name: MAST_TRAILER_REC
  bigquery:
    project_id: pcb-{env}-landing
    dataset_id: domain_account_management
    data_load_type: APPEND_ONLY
    tables:
      AH00:
        table_name: AH00
        record_count_column: TRAILER_REC_CNT_X_1
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      AH01:
        table_name: AH01
        record_count_column: TRAILER_REC_CNT_X_2
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
          - IF(AH01_CDATE_CYCLE IS NOT NULL AND AH01_CDATE_CYCLE>0, PARSE_DATE('%E4Y%j', CAST(10000000-AH01_CDATE_CYCLE AS STRING)), SAFE_CAST(NULL AS DATE)) AS AH01_CDATE_CYCLE
        drop_columns:
          - AH01_CDATE_CYCLE
        join:
          - project_id: pcb-{env}-landing
            dataset_id: domain_account_management
            table_name: AH00
            output_columns:
              - AH00_CLIENT_NUM
              - AH00_APPLICATION_NUM
            join_columns:
              - from_col: s.FILE_CREATE_DT
                to_col: t.FILE_CREATE_DT
              - from_col: s.MAST_ACCOUNT_ID
                to_col: t.MAST_ACCOUNT_ID
              - from_col: s.AH00_APPLICATION_SUFFIX
                to_col: t.AH00_APPLICATION_SUFFIX
      AH02_ADJ_PASTDUE:
        table_name: AH02_ADJ_PASTDUE
        is_redefine: True
        record_count_column: TRAILER_REC_CNT_X_6
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
          - IF(AH02_CDATE_HISTORY IS NOT NULL AND AH02_CDATE_HISTORY>0, PARSE_DATE('%E4Y%j', CAST(10000000-AH02_CDATE_HISTORY AS STRING)), SAFE_CAST(NULL AS DATE)) AS AH02_CDATE_HISTORY
          - IF(AH02_CTIME_HISTORY IS NOT NULL AND AH02_CTIME_HISTORY>0, REGEXP_REPLACE(FORMAT('%07d', CAST(10000000-AH02_CTIME_HISTORY AS INT64)), r'^([0-9]{2})([0-9]{2})([0-9]{3})$', '\\1:\\2:\\3'), SAFE_CAST(AH02_CTIME_HISTORY AS STRING))  AS AH02_CTIME_HISTORY
        drop_columns:
          - AH02_CDATE_HISTORY
          - AH02_CTIME_HISTORY
          - AH02_ACT_HIST_DETAIL_DATA
        join:
          - project_id: pcb-{env}-landing
            dataset_id: domain_account_management
            table_name: AH00
            output_columns:
              - AH00_CLIENT_NUM
              - AH00_APPLICATION_NUM
            join_columns:
