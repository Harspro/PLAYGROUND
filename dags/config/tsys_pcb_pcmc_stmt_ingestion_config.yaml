  file_prefix: tsys_pcb_pcmc_stmt_reg_rdf
  folder_prefix: tsys_pcb_pcmc_stmt_reg_rdf
  trigger_dag_id: pcb_dst_pcmc_stmt_output_file_creation_post_extractor
  spark:
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/tsys-spark-batch-2.0.0.jar
    main_class: com.pcb.batch.spark.tsys.TsysSparkBatchApplication
    filtering_job_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      pcb.tsys.processor.datafile.type: PCMC_STATEMENT
      pcb.tsys.processor.filtering: true
    parsing_job_args:
