        landing_pause: TRUE
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      SA41:
        table_name: SA41
        record_count_column: SA41_COUNT
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      SA59:
        table_name: SA59
        record_count_column: SA59_COUNT
        landing_pause: TRUE
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      SA60:
        table_name: SA60
        record_count_column: SA60_COUNT
