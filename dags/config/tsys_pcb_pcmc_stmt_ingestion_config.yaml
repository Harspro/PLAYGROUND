      pcb.tsys.processor.datafile.type: PCMC_STATEMENT
      pcb.tsys.processor.output.format: parquet
      pcb.tsys.processor.output.path: _tempplaceholder
    segment_dependency_groups:
      - group_name: header_group
        segments: SA00, INDEXLOADER
      - group_name: trailer_group
        segments: SA99
      - group_name: detail_group
        segments: SA10, SA14, SA15, SA20, SA30, SA40, SA41, SA59, SA60, SA65 ,SA85
    segment_args:
      INDEXLOADER:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_pcmc_stmt/INDEXLOADER.CPY
        pcb.tsys.processor.segment.name: INDEXLOADER
        pcb.tsys.processor.layout.name: INDEXLOADER_REC
