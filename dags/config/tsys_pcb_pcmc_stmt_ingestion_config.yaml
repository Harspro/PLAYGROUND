      SA85:
        table_name: SA85
        record_count_column: SA85_COUNT
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      SA99:
        table_name: SA99
        add_columns:
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA10') AS SA10_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA14') AS SA14_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA15') AS SA15_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA20') AS SA20_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA30') AS SA30_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA40') AS SA40_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA41') AS SA41_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA59') AS SA59_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA60') AS SA60_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA65') AS SA65_COUNT
          - (SELECT COUNT(MAST_RECORD_ID) FROM `pcb-{env}-processing.domain_account_management.STMT_HO50_INDEXCTL_{file_type}_DBEXT` WHERE MAST_RECORD_ID = 'SA85') AS SA85_COUNT
