loyalty_offer_kafka_writer:
  default_args:
    owner: "team-digital-adoption-alerts"
    capability: "account-management"
    severity: "P3"
    sub_capability: "account-management"
    business_impact: "This loads customers eve loyalty offers into kafka topic: dp-core-{env}-loyalty-offer-presentation."
    customer_impact: "In the event of a failure,eve loyalty offers for the new eligible customers will not be available in the DP."
  file_uris:
    - gs://pcb-{env}-staging-artifacts/resources/file-kafka-connector/digital-adoption/loyalty-offer/application.yaml
    - gs://pcb-{env}-staging-artifacts/resources/file-kafka-connector/digital-adoption/loyalty-offer/schema_mapping.yaml
    - gs://pcb-{env}-staging-artifacts/resources/file-kafka-connector/digital-adoption/loyalty-offer/loyalty_offer_key.avsc
    - gs://pcb-{env}-staging-artifacts/resources/file-kafka-connector/digital-adoption/loyalty-offer/loyalty_offer_value.avsc
    - gs://pcb-{env}-staging-artifacts/resources/file-kafka-connector/digital-adoption/loyalty-offer/loyalty_offer_file_schema.avsc
  application_config: application.yaml
  args:
    pcb.file.kafka.connector.avro.key.schema.path: loyalty_offer_key.avsc
    pcb.file.kafka.connector.avro.value.schema.path: loyalty_offer_value.avsc
    pcb.file.kafka.connector.file.kafka.schema.mapping.path: schema_mapping.yaml
    pcb.file.kafka.connector.file.type: PARQUET
    pcb.file.kafka.connector.file.path:
      file_source_bigquery: true
    pcb.file.kafka.connector.kafka.key: pcmaAccountId
    pcb.file.kafka.connector.kafka.key.part.of.dataset: true
    pcb.file.kafka.connector.schema.file.path: loyalty_offer_file_schema.avsc
  dag:
    kafka_writer_task: kafka_writer_loyalty_offer
    read_pause_deploy_config: False
    tags: [ "Digital-Adoption" ]
    job_size: extra_small
    dataproc_cluster_name: loyalty-offer
  bigquery:
    project_id: pcb-{env}-processing
    dataset_id: domain_account_management
    query_file: digital_adoption/sql/loyalty_offer_kafka.sql
  gcs:
    bucket: pcb-{env}-staging-extract
    folder_name: digital-adoption
    file_name: loyalty-offer
