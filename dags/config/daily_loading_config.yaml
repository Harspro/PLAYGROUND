ods_platform_user_table_daily_loading_job:
  jar_file_uris:
    - gs://pcb-{env}-staging-artifacts/jarfiles/ods-bigquery-connector-2.0.0.jar
  file_uris:
    - gs://pcb-{env}-staging-artifacts/resources/ods-bigquery-connector/application-pds-ods.conf
  main_class: com.pcb.batch.odsbigqueryconnector.ODSToGCSConnector
  application_config: application-pds-ods.conf
  args:
    pcb.bigquery.loader.source.schema.qualified.tablename: CARDINAL.PLATFORM_USER
    pcb.bigquery.loader.source.primary.key.column: PLATFORM_USER_UID
    pcb.bigquery.loader.source.db.read.parallelism: 8
  gcs:
    bucket: pcb-{env}-staging-extract
    staging_folder: ods
  bigquery:
    dataset_id: domain_customer_management
    table_name: PLATFORM_USER
  dag:
    schedule_interval: '0 6 * * *'
  default_args:
    owner: "team-digital-adoption-alerts"
    capability: "account-management"
    sub_capability: "customer-management"
    business_impact: "Potential compliance issue due to delay in loading business data"
    customer_impact: "Delay in loading business data"
    severity: "P3"

