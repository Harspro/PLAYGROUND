score_rms_post_extractor:
  default_args:
    owner: "team-defenders-alerts"
    capability: "risk-management"
    severity: "P3"
    sub_capability: "credit-risk"
    business_impact: 'Recovery Management from TSYS will not be processed and sent to Score'
    customer_impact: 'RMS transactions will not be posted to Score'
  tags: ["Risk Management - RMS" , "P3" ]
  job_size: medium
  processing_bucket: pcb-{env}-staging
  cluster_name: rms-output-loader-c
  processing_bucket_config: pcb-{env}-staging-artifacts
  processing_bucket_extract: pcb-{env}-staging-extract
  PROCESSING_INTERIM_DIR: rms_processing/rms_post/extract
  PROCESSING_OUTPUT_DIR: rms_processing/rms_post/extract
  staging_bucket: pcb-{env}-staging
  destination_bucket: score-outbound-pcb{env_suffix}
  spark:
    output_jar_uri:
      - gs://pcb-{env}-staging-artifacts/jarfiles/rms-spark-batch-2.0.0.jar
    file_uris:
      - gs://pcb-{env}-staging-artifacts/resources/rms-spark-batch/application.yaml
    output_main_class: com.pcb.batch.spark.tsysScore.TsysScoreSparkBatchApplication
    output_job_args:
      interim.filepath: _tempplaceholder
      output.filepath: _tempplaceholder
      file.name: _tempplaceholder
      output.filename: "pcb_score_rms"
      filename.extension: "{file_env}"
      copybook.path: "gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_rms/"
  bigquery:
    project_id: pcb-{env}-landing
    landing_proj_id: pcb-{env}-landing
    dataset_id: domain_account_management
    batch_num_table: RMS_POST_PARAM
    data_load_type: APPEND_ONLY
    key_table: PCH_RMS_KEYCONTROL
    segment_dependency_groups:
      - group_name: header
        segments: HEDR
      - group_name: detail
        segments: DETL01,DETL04,DETL03
      - group_name: trailer
        segments: TRLR
    segment_args:
      HEDR:
        input_table_name: TSYS_RMS_HEDR
        output_table_name: RMS_SCORE_HEDR
      DETL01:
        input_table_name: RMS_NEW_ACCOUNT_01
        output_table_name: RMS_SCORE_DETL01
      DETL03:
        input_table_name: RMS_TRANSACTION_03
        output_table_name: RMS_SCORE_DETL03
      DETL04:
        input_table_name: RMS_MAINT_ACCOUNT_04
        output_table_name: RMS_SCORE_DETL04
      TRLR:
        input_table_name: TSYS_RMS_TRLR
        output_table_name: RMS_SCORE_TRLR