pcma_cdic_orchestrator:
  default_args:
    owner: "team-defenders-alerts"
    capability: "risk-management"
    sub_capability: "deposit-insurance-cdic"
    severity: "P2"
    business_impact: "Compliance with CDIC"
    customer_impact: "No Impact"
    retries: 3
    retry_delay: 300
  dag:
    dagrun_timeout: 120
    start_date: "2025-01-01"
    catchup: false
    description: "PCMA CDIC DAG Orchestrator DAG. This DAG will trigger all CDIC DAGs for File Loading, Extraction and Consolidation."
    read_pause_deploy_config: True
    sub_dag_trigger_rule: "all_done"
  task_groups:
    - group_id: pcma_domain_cdic_csv_to_bq_loading_dags_group_01
      description: File loading dags (from CSV files to BigQuery CDIC tables).
      execution_mode: parallel
      dags:
        - sub_dag_id: pcma_cdic_0201_domain_cdic_loading_job
        - sub_dag_id: pcma_cdic_0202_domain_cdic_loading_job
        - sub_dag_id: pcma_cdic_0211_domain_cdic_loading_job
        - sub_dag_id: pcma_cdic_0221_domain_cdic_loading_job
        - sub_dag_id: pcma_cdic_0501_domain_cdic_loading_job
    - group_id: pcma_domain_cdic_csv_to_bq_loading_dags_group_02
