TS2_at31_accttx_kafka_writer_orchestrator:
  default_args:
    owner: "team-convergence-alerts"
    capability: "Loyalty"
    sub_capability: "NA"
    severity: "P2"
    business_impact: "Compliance"
    customer_impact: "No Impact"
    retries: 3
    retry_delay: 300
  dag:
    dagrun_timeout: 120
    start_date: "2025-01-01"
    catchup: false
    description: "Pushes Dag completion record in jobControlDataset for TS2_at31_accttx_kafka_writer."
    sub_dag_trigger_rule: "all_done"
  task_groups:
    - group_id: accttx_kafka_writer_save_job_to_control_table_dags_group_01
      description: TS2_at31_accttx_kafka_writer Dag completion record is pushed to jobControlDataset in BQ.
      execution_mode: sequential
      dags:
        - sub_dag_id: TS2_at31_accttx_kafka_writer
          params:
            {
              "bucket": "{{ dag_run.conf['bucket'] }}",
              "cluster_name": "{{ dag_run.conf['cluster_name'] }}",
              "file_name": "{{ dag_run.conf['file_name'] }}",
              "folder_name": "{{ dag_run.conf['folder_name'] }}",
              "name": "{{ dag_run.conf['name'] }}"
            }
        - sub_dag_id: TS2_at31_accttx_kafka_writer_control_table_update

returncff_processing_orchestrator:
  default_args:
    owner: "team-digital-adoption-alerts"
    capability: "Account Management - Digital Adoption"
    sub_capability: "NA"
    severity: "P2"
    business_impact: "Potential compliance issue due to delay in loading business data"
    customer_impact: "Delay in loading business data"
    retries: 3
    retry_delay: 300
  dag:
    dagrun_timeout: 120
    start_date: "2025-01-01"
    catchup: false
    description: "Processing ReturnCFF file from Broadridge post file loading"
    sub_dag_trigger_rule: "all_done"
  task_groups:
    - group_id: returncff_processing_dags_group_01
      description: Post processing task to update/insert STMT_CME_FEEDBACK_STAGING, STMT_CME_FEEDBACK and CME_CUSTOMER tables
      execution_mode: sequential
      dags:
        - sub_dag_id: psf_p_dst_pcb_returncff_file_loading
          params:
            {
              "bucket": "{{ dag_run.conf['bucket'] }}",
              "name": "{{ dag_run.conf['name'] }}",
              "folder_name": "{{ dag_run.conf['folder_name'] }}",
              "file_name": "{{ dag_run.conf['file_name'] }}"
            }
        - sub_dag_id: returncff_loading_job
          params:
            {
              "file_name": "{{ dag_run.conf['file_name'] }}"
            }
        - sub_dag_id: returncff_cme_customer_update_bq_to_oracle

tcs_purge_image_metadata_orchestrator:
  default_args:
    owner: "team-defenders-alerts"
    capability: "risk-management"
    sub_capability: "fraud"
    severity: "P3"
    business_impact: "Compliance with TCS Purging"
    customer_impact: "No Impact"
    retries: 3
    retry_delay: 300
  dag:
    dagrun_timeout: 10080
    max_active_runs: 1
    start_date: "2025-01-01"
    catchup: false
    description: " TCS Purge Image Metadata Orchestrator DAG. This DAG will orchestrate TCS Purge pipeline steps including: a) Move case images file to processing zone. b) Decompressed file using Spark GenericUtilityRunner. c) Ingest metadata related to files into GCP BigQuery. d) Publish the metadata records to a Kafka topic."
    read_pause_deploy_config: True
    sub_dag_trigger_rule: "all_success"
  task_groups:
    - group_id: tcs_purge_image_metadata_task_group
      description: TCS Purge Image Metadata Orchestrator DAG.
      execution_mode: sequential
      dags:
        - sub_dag_id: tcs_purge_case_image_landing_to_processing_job
        - sub_dag_id: tcs_purge_staging_extract_cleanup_job
        - sub_dag_id: tcs_purge_dataproc_decompression_job
          params:
            {
              "name": "{{ dag_run.conf['name'] }}"
            }
        - sub_dag_id: tsys_tcs_casepurge_images_outbound_cleanup_job
        - sub_dag_id: tcs_purge_case_image_staging_extract_to_tsys_outbound_job
        - sub_dag_id: tcs_purge_image_metadata_loading_job
          params:
            {
              "file_name": "{{ dag_run.conf['file_name'] }}"
            }
        - sub_dag_id: tcs_purge_image_metadata_kafka_writer

