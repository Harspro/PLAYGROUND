pcma_cdic_0110_file_consolidation_job:
  default_args:
    owner: "team-defenders-alerts"
    capability: "risk-management"
    sub_capability: "deposit-insurance-cdic"
    severity: "P2"
    business_impact: "Compliance with CDIC"
    customer_impact: "No Impact"
    retries: 3
    retry_delay: 300
  dag:
    dagrun_timeout: 120
    start_date: "2025-01-01"
    catchup: false
    description: "PCMA CDIC pcb-{env}-curated.cots_cdic.PCMA_CDIC_0110 file consolidation."
    tags: [ "team-defenders-alerts" , "P2" ]
  tasks:
    - task_id: "file_0110_consolidation"
      python_callable:
        module: util.miscutils
        method: compose_infinite_files_into_one
      args:
        "source_config": {"bucket": "pcb-{env}-staging-extract", "folder_prefix": "cdic/pcma/extract", "file_prefix": "cdic-0110-"}
        "dest_config": {"bucket": "cdic-outbound-pcb{env_suffix}", "folder_prefix": "pcma", "file_name": "PCBA{{ dag_run.conf['date_prefix'] }}01102310002.txt"}
        "win_compatible": true,
        "replace_empty_with_blank": true

