switch_growth_create_view:
  default_args:
    owner: "team-defenders-alerts"
    capability: "SWITCH_GROWTH"
    sub_capability: "SWITCH_GROWTH Views"
    severity: "P2"
    business_impact: "One Time View creation DAG for pcf_current_switch_file"
    customer_impact: "No Impact"
    retries: 3
    retry_delay: 300
  dag:
    dagrun_timeout: 120
    start_date: "2025-01-01"
    catchup: false
    description: "Data Transfer Pipeline for Switch Growth"
    tags: [ "team-defenders-alerts" , "P2" ]
  bigquery_tasks:
    - task_id: "create_view_pcf_current_switch_file"
      query_file: "switch_growth_processing/sql/create_view_pcf_current_switch_file.sql"
      target_service_account: pcb-switch-sa@pcb-{env}-processing.iam.gserviceaccount.com
      target_project: pcb-{env}-curated
      env_specific_replacements: True
      replacements:
        dev:
          "{deploy-env}" : "nonprod"
        uat:
          "{deploy-env}" : "nonprod"
        prod:
          "{deploy-env}" : "prod"

switch_growth_data_processing:
  default_args:
    owner: "team-defenders-alerts"
    capability: "SWITCH_GROWTH"
    sub_capability: "SWITCH_GROWTH switch_growth_data_processing pipeline"
    severity: "P2"
    business_impact: "Daily Refresh View pcf_current_switch_file data load into vendor switch growth table."
    customer_impact: "No Impact"
    retries: 3
    retry_delay: 300
  dag:
    dagrun_timeout: 120
    schedule_interval: "00 10,15 * * *"
    start_date: "2025-01-01"
    catchup: false
    description: "Data Transfer Pipeline for Switch Growth"
    tags: [ "team-defenders-alerts" , "P2" ]
  bigquery_tasks:
    - task_id: "submit_to_vendor"
      query_file: "switch_growth_processing/sql/submit_to_vendor.sql"
      target_service_account: pcb-switch-sa@pcb-{env}-processing.iam.gserviceaccount.com
      target_project: switch-pcfinancial
      env_specific_replacements: True
      replacements:
        dev:
          "{table_vendor_pcf_current_switch_file}" : "switch-pcfinancial.test_shared_pcf.pcf_current_switch_file"
        uat:
          "{table_vendor_pcf_current_switch_file}" : "switch-pcfinancial.test_shared_pcf.pcf_current_switch_file"
        prod:
          "{table_vendor_pcf_current_switch_file}" : "switch-pcfinancial.shared_pcbank_prod.pcf_current_switch_file"
    - task_id: "log_row_count"
      query: "SELECT * FROM {table_vendor_pcf_current_switch_file}"
      target_service_account: pcb-switch-sa@pcb-{env}-processing.iam.gserviceaccount.com
      target_project: switch-pcfinancial
      env_specific_replacements: True
      replacements:
        dev:
          "{table_vendor_pcf_current_switch_file}" : "switch-pcfinancial.test_shared_pcf.pcf_current_switch_file"
        uat:
          "{table_vendor_pcf_current_switch_file}" : "switch-pcfinancial.test_shared_pcf.pcf_current_switch_file"
        prod:
          "{table_vendor_pcf_current_switch_file}" : "switch-pcfinancial.shared_pcbank_prod.pcf_current_switch_file"
    - task_id: "append_to_audit_table"
      query_file: "switch_growth_processing/sql/append_to_audit_table.sql"
      replacements:
        "{run_id}": "{{ run_id }}"

