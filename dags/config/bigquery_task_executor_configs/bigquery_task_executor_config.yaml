offer_assignment_manual_csv_load:
  default_args:
    owner: "team-convergence-alerts"
    business_impact: "Offer assignment/update for impacted customers"
    customer_impact: "Customers are assigned with correct offers"
    capability: "loyalty"
    sub_capability: "rewards"
    retries: 3
    retry_delay: 300
  dag:
    dagrun_timeout: 120
    start_date: "2026-01-01"
    catchup: false
    description: "This DAG is to assign/update offer assignment to customers manually"
    tags: ["Loyalty"]
  bigquery_tasks:
    - task_id: "create-external-table"
      query_file: "loyalty_processing/targeted_offer/create_offer_assignment_from_csv.sql"
    - task_id: "update-existing-offers"
      query_file: "loyalty_processing/targeted_offer/update_offer_assignment_from_csv.sql"
    - task_id: "insert-new-offers"
      query_file: "loyalty_processing/targeted_offer/insert_offer_assignment_from_csv.sql"

