ntt_conv_cheque_loader:
  default_args:
    owner: "team-money-movement-eng"
    capability: "Payments"
    severity: "P3"
    sub_capability: "Data Movement"
    business_impact: 'Convenience cheques oders from NTT will not be processed and sent to TSYS'
    customer_impact: 'Customer convenience cheques requests will not be posted to TSYS'
  tags: ["MoneyMove - payments", "P3"]
  job_size: small
  source_bucket: m1s-inbound-pcb
  processing_bucket: pcb-{env}-staging
  processing_bucket_config: pcb-{env}-staging-artifacts
  processing_bucket_extract: pcb-{env}-staging-extract
  file_prefix: m1s_pcb_convchq
  folder_prefix: m1s_pcb_convchq
  outbound_trigger: True
  trigger_dag_id: tsys_conv_cheque_post_extractor
  spark:
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/ntt-spark-batch-2.0.0.jar
    main_class: com.pcb.batch.spark.ntt.NttSparkBatchApplication
    parsing_job_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      gcs.staging.bucket.name: pcb-{env}-staging
      data.file.name: _tempplaceholder
      ntt.file.type: Convenience-Cheque
      collection.outpath: _tempplaceholder
      pcb.tsys.processor.output.format: parquet
      pcb.tsys.processor.output.path: _tempplaceholder
    segment_dependency_groups:
      - group_name: trailer_group
        segments: TRLR
      - group_name: detail_group
        segments: DETL
      - group_name: header_group
        segments: HEDR
    segment_args:
      HEDR:
        schema.file.path: pyhdr.json
        segment.name: HEDR
      DETL:
        schema.file.path: pyconvchqdtl.json
        segment.name: CHQ
      TRLR:
        schema.file.path: pytrlr.json
        segment.name: TRLR
  bigquery:
    project_id: pcb-{env}-landing
    landing_proj_id: pcb-{env}-landing
    dataset_id: domain_payments
    data_load_type: APPEND_ONLY
    tables:
      HEDR:
        table_name: CONVCHQ_HEDR
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
          - PARSE_DATE('%Y%m%d',CAST(FILE_CREATE_DT AS STRING)) AS FILE_CREATE_DT
        drop_columns:
          - FILE_CREATE_DT
      DETL:
        table_name: CONVCHQ_DETL
        record_count_column: RECORD_COUNT
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
          - PARSE_DATE('%Y%m%d',FILE_CREATE_DT) AS FILE_CREATE_DT
        drop_columns:
          - FILE_CREATE_DT
      TRLR:
        table_name: CONVCHQ_TRLR
        create_date_column: FILE_CREATE_DT
        amount_column: TOTAL_AMOUNT
        add_columns:
          - CURRENT_DATETIME('America/Toronto')  AS REC_LOAD_TIMESTAMP
          - PARSE_DATE('%Y%m%d',FILE_CREATE_DT) AS FILE_CREATE_DT
        drop_columns:
          - FILE_CREATE_DT
        duplicate_check_cols:
          - FILE_CREATE_DT

