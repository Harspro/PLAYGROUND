tsys_cheque_order_loader:
  default_args:
    owner: "team-money-movement-eng"
    capability: "Payments"
    severity: "P3"
    sub_capability: "Money Movement"
    business_impact: 'Convenience Cheque orders will not be processed and sent to NTT'
    customer_impact: 'Customers who ordered cheques will not be processed by NTT'
  tags: ["MoneyMove - payments", "P3"]
  job_size: small
  source_bucket: tsys-inbound-pcb
  processing_bucket: pcb-{env}-staging
  processing_bucket_config: pcb-{env}-staging-artifacts
  processing_bucket_extract: pcb-{env}-staging-extract
  file_prefix: tsys_pcb_chqorder
  folder_prefix: tsys_pcb_chqorder
  outbound_trigger: True
  trigger_dag_id: dnh_cheque_order_extractor
  spark:
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/tsys-spark-batch-2.0.0.jar
    file_uris:
      - gs://pcb-{env}-staging-artifacts/resources/payments-spark-batch/application.yaml
    main_class: com.pcb.batch.spark.tsys.TsysSparkBatchApplication
    filtering_job_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      pcb.tsys.processor.datafile.type: CHEQUE_ORDER
      pcb.tsys.processor.filtering: true
    parsing_job_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      pcb.tsys.processor.datafile.type: CHEQUE_ORDER
      pcb.tsys.processor.output.format: parquet
      pcb.tsys.processor.output.path: _tempplaceholder
    segment_dependency_groups:
      - group_name: trailer_group
        segments: TRLR
      - group_name: detail_group
        segments: DETL
      - group_name: header_group
        segments: HEDR
    segment_args:
      HEDR:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_cheque_order/HDR.CPY
        pcb.tsys.processor.segment.name: HEDR
        pcb.tsys.processor.layout.name: HEDR_REC
      DETL:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_cheque_order/DETL.CPY
        pcb.tsys.processor.segment.name: DETL
        pcb.tsys.processor.layout.name: DETL_REC
      TRLR:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_cheque_order/TRLR.CPY
        pcb.tsys.processor.segment.name: TRLR
        pcb.tsys.processor.layout.name: TRLR_REC

  bigquery:
    project_id: pcb-{env}-landing
    landing_proj_id: pcb-{env}-landing
    dataset_id: domain_payments
    data_load_type: APPEND_ONLY
    tables:
      HEDR:
        table_name: TS2_CHQORDER_HEDR
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      DETL:
        table_name: TS2_CHQORDER_DETL
        record_count_column: CKS_TRL_REC_COUNT
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      TRLR:
        table_name: TS2_CHQORDER_TRLR
        create_date_column: FILE_CREATE_DT
        amount_column: CKS_TRL_REC_COUNT
        add_columns:
          - CURRENT_DATETIME('America/Toronto')  AS REC_LOAD_TIMESTAMP
        duplicate_check_cols:
          - FILE_CREATE_DT

tsys_convchq_conf_loader:
  default_args:
    owner: "team-money-movement-eng"
    capability: "Payments"
    severity: "P3"
    sub_capability: "Data Movement"
    business_impact: 'NO impact this is a confirmation file from TSYS'
    customer_impact: 'No Impact'
  tags: ["MoneyMove - payments", "P3"]
  job_size: small
  source_bucket: tsys-inbound-pcb
  processing_bucket: pcb-{env}-staging
  processing_bucket_config: pcb-{env}-staging-artifacts
  processing_bucket_extract: pcb-{env}-staging-extract
  file_prefix: tsys_pcb_convchq_conf
  folder_prefix: tsys_convchq_conf
  outbound_trigger: True
  trigger_dag_id: tsys_conv_cheque_fee_extractor
  spark:
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/tsys-spark-batch-2.0.0.jar
    main_class: com.pcb.batch.spark.tsys.TsysSparkBatchApplication
    file_uris:
