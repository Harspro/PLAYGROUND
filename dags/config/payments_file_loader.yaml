      pcb.tsys.processor.datafile.type: CONVCHQ_CONF
      pcb.tsys.processor.output.format: parquet
      pcb.tsys.processor.output.path: _tempplaceholder
    segment_dependency_groups:
      - group_name: trailer_group
        segments: TRLR, TR-TRLR
      - group_name: detail_group
        segments: DETL
      - group_name: header_group
        segments: HEDR, TR-HEDR
    segment_args:
      HEDR:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_convchq_conf/HEDR.CPY
        pcb.tsys.processor.segment.name: 9012
        pcb.tsys.processor.layout.name: HEDR_REC
      TR-HEDR:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_convchq_conf/TR-HEDR.CPY
        pcb.tsys.processor.segment.name: 9010
        pcb.tsys.processor.layout.name: TR_HEDR_REC
      DETL:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_convchq_conf/DETL.CPY
        pcb.tsys.processor.segment.name: "0104"
        pcb.tsys.processor.layout.name: DETL_REC
      TRLR:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_convchq_conf/TRLR.CPY
        pcb.tsys.processor.segment.name: 9013
        pcb.tsys.processor.layout.name: TRLR_REC
      TR-TRLR:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_pcb_convchq_conf/TR-TRLR.CPY
        pcb.tsys.processor.segment.name: 9011
        pcb.tsys.processor.layout.name: TR_TRLR_REC
  bigquery:
    project_id: pcb-{env}-landing
    landing_proj_id: pcb-{env}-landing
    dataset_id: domain_payments
    data_load_type: APPEND_ONLY
    tables:
      HEDR:
        table_name: CONVCHQ_CONF_HEDR
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      TR-HEDR:
        table_name: CONVCHQ_CONF_TR_HDR
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      DETL:
        table_name: CONVCHQ_CONF_DETL
        record_count_column: BT1_NUMBER_OF_DEBITS
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP
      TRLR:
        table_name: CONVCHQ_CONF_TRLR
        create_date_column: FILE_CREATE_DT
        amount_column: BT1_AMOUNT_OF_DEBITS
        add_columns:
          - CURRENT_DATETIME('America/Toronto')  AS REC_LOAD_TIMESTAMP
        duplicate_check_cols:
          - FILE_CREATE_DT
      TR-TRLR:
        table_name: CONVCHQ_CONF_TR_TRLR
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP

