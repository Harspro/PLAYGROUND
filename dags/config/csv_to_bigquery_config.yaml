      - PARSE_DATETIME('%m/%d/%Y %I:%M:%S %p', TXN_DATE_AND_TIME)) AS TRANSACTION_DATE
      - REPLACE(REPLACE(REPLACE(ACCOUNT_NUMBER, 'X', '0'), 'Y', '1'), 'Z', '2') AS CARD_NUMBER
  dag:
    read_pause_deploy_config: False
