# One dag per CSV file.
# Supports header, field-delimiter, add/drop columns, renames,
# simple transformations and append/full-refresh
esso_merchant_file_loading_job:
  default_args:
    owner: "team-convergence-alerts"
    capability: "Loyalty"
    severity: "P2"
    sub_capability: "Rewards"
    business_impact: "This will impact the loading of non-padded ESSO merchants into BigQuery. The merchant list is used to block ESSO transactions from getting the points from these locations."
    customer_impact: "If ESSO adds a new store and we receive transactions, the PC points will be awarded (Costing implication: Customer gets extra points)."
  tags: ["Loyalty"]
  source_file:
    csv_options:
      skip_leading_rows: 1
      field_delimiter: "|"
    max_bad_records: 2
    ignore_unknown_values: True
    schema_external:
      - {"name": "RECORD_TYPE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "INDEX_NUM", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "CARD_NUMBER", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "CARD_BIN", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "CARD_LAST4", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "FUEL_TYPE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "FUEL_NAME", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "LITERS_PURCHASED", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "NAME_ON_CARD", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "CARD_EXPIRY_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "TRANSACTION_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "TRANSACTION_CODE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "TRANSACTION_AMOUNT", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "MERCHANT_NUMBER", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "MERCHANT_NAME", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "MERCHANT_CATEGORY_CODE", "type": "INTEGER", "mode": "NULLABLE"}
      - {"name": "MERCHANT_COUNTRY_CODE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "TRANSACTION_REF_NUMBER", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "LOYALTY_REF_NUM", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "PROMO_CODE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "MERCHANT_ID", "type": "STRING", "mode": "NULLABLE"}
  bigquery:
    project_id: pcb-{env}-curated
    dataset_id: domain_loyalty
    table_name: MERCHANT
    data_load_type: MERGE_INSERT
    add_file_name_column:
      alias: SOURCE_FILENAME
    target_columns:
      - MRCH_ID
      - MRCH_NM
      - STAT
      - LOAD_TIMESTAMP
      - SOURCE_FILENAME
    source_columns:
      - MERCHANT_NUMBER
      - MERCHANT_NAME
      - "'A'"
      - CURRENT_DATETIME("America/Toronto")
  merge:
    join_columns:
      - from_column: T.MRCH_ID
        to_column: S.MERCHANT_NUMBER
    distinct_source: True
  dag:
    read_pause_deploy_config: True

