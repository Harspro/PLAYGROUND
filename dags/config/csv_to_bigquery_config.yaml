      - {"name": "MERCHANT_COUNTRY_CODE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "TRANSACTION_REF_NUMBER", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "LOYALTY_REF_NUM", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "PROMO_CODE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "MERCHANT_ID", "type": "STRING", "mode": "NULLABLE"}
