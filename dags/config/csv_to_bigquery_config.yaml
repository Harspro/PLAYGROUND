      - MERCHANT_NUMBER
      - MERCHANT_NAME
      - "'A'"
      - CURRENT_DATETIME("America/Toronto")
  merge:
    join_columns:
      - from_column: T.MRCH_ID
        to_column: S.MERCHANT_NUMBER
    distinct_source: True
