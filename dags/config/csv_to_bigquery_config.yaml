purgelist_experian:
  default_args:
    owner: "team-growth-and-sales-alerts"
    capability: "CustomerAcquisition"
    severity: "P3"
    sub_capability: "Applications"
    business_impact: "Compliance Issue if the data is not purged"
  tags:
    - team-growth-and-sales
  source_file:
    bucket: pcb-{env}-staging-extract
    name: purging/experian_purge_list.csv
    csv_options:
      skip_leading_rows: 1
      field_delimiter: ","
    schema_external:
      - {"name": "APP_NUMBER", "type": "INTEGER", "mode": "REQUIRED"}
      - {"name": "APP_TYPE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "MAST_ACCOUNT_ID", "type": "INTEGER", "mode": "NULLABLE"}
      - {"name": "IMAGE_ID", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "DECLINE_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "ACCOUNT_CLOSE_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "CREDIT_REVOKE_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "LAST_FINANCIAL_ACTIVITY_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "CURRENT_BALANCE", "type": "FLOAT", "mode": "NULLABLE"}
      - {"name": "APP_SOURCE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "PURGE_LIST_DATE", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "PURGE_IND", "type": "INTEGER", "mode": "NULLABLE"}
  bigquery:
    project_id: pcb-{env}-landing
    dataset_id: domain_customer_acquisition
    table_name: PURGELIST_EXPERIAN
    partition_field: DATE_TRUNC(PURGE_LIST_DATE, MONTH)
    data_load_type: APPEND_ONLY
    add_columns:
      - PARSE_DATE('%Y%m%d', ACCOUNT_CLOSE_DATE) AS ACCOUNT_CLOSE_DATE
      - PARSE_DATE('%Y%m%d', CREDIT_REVOKE_DATE) AS CREDIT_REVOKE_DATE
      - PARSE_DATE('%Y%m%d', DECLINE_DATE) AS DECLINE_DATE
      - CASE LENGTH(LAST_FINANCIAL_ACTIVITY_DATE)
        WHEN 8 THEN PARSE_DATE('%Y%m%d',LAST_FINANCIAL_ACTIVITY_DATE)
        ELSE NULL
        END AS LAST_FINANCIAL_ACTIVITY_DATE
      - PARSE_DATE('%Y%m%d', PURGE_LIST_DATE) AS PURGE_LIST_DATE
      - CURRENT_DATETIME('America/Toronto') AS CREATE_TS
      - string(null) AS PURGE_CYCLE
      - "'N' AS IS_TERMINUS"
    drop_columns:
      - DECLINE_DATE
      - ACCOUNT_CLOSE_DATE
      - CREDIT_REVOKE_DATE
      - LAST_FINANCIAL_ACTIVITY_DATE
      - PURGE_LIST_DATE

