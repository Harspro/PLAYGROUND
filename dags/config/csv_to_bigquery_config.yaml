load_customers_welcome_offer_job:
  default_args:
    owner: "team-convergence-alerts"
    business_impact: "business team can calculate and issue points"
    capability: "loyalty"
    sub_capability: "rewards"
    severity: "P2"
  tags: ["P2"]
  source_file:
    bucket: COMPOSER_BUCKET
    name: dags/loyalty_processing/targeted_offer_fulfillment/Offers_to_Load_to_BQ_PROD.csv
    csv_options:
      skip_leading_rows: 1
      field_delimiter: ","
      max_bad_records: 0
      null_marker: "null"
    schema_external:
      - {"name": "offerFulfillmentId", "type": "INTEGER", "mode": "REQUIRED"}
      - {"name": "accountId", "type": "INTEGER", "mode": "REQUIRED"}
      - {"name": "tsysAccountId", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "offerTriggerId", "type": "INTEGER", "mode": "REQUIRED"}
      - {"name": "periodStartTimestamp", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "periodEndTimestamp", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "trackerType", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "status", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "currentValue", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "targetValue", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "points", "type": "INTEGER", "mode": "REQUIRED"}
      - {"name": "fulfilledTimestamp", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "fulfilledTransactionId", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "createTimestamp", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "createUserId", "type": "STRING", "mode": "REQUIRED"}
      - {"name": "updateTimestamp", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "updateUserId", "type": "STRING", "mode": "NULLABLE"}
      - {"name": "eventType", "type": "STRING", "mode": "REQUIRED"}
  bigquery:
    project_id: pcb-{env}-landing
    dataset_id: domain_loyalty
    table_name: PC_TARGETED_OFFER_FULFILLMENT
    data_load_type: MERGE_INSERT
    target_columns:
      - offerFulfillmentId
      - accountId
      - tsysAccountId
      - offerTriggerId
      - periodStartTimestamp
      - periodEndTimestamp
      - trackerType
      - status
      - currentValue
      - targetValue
      - points
      - fulfilledTimestamp
      - fulfilledTransactionId
      - createTimestamp
      - createUserId
      - updateTimestamp
      - updateUserId
      - eventType
    source_columns:
      - offerFulfillmentId
      - accountId
      - tsysAccountId
      - offerTriggerId
      - PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', periodStartTimestamp) AS periodStartTimestamp
      - PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', periodEndTimestamp) AS periodEndTimestamp
      - trackerType
      - status
      - currentValue
      - targetValue
      - points
      - CASE WHEN fulfilledTimestamp IS NULL OR LOWER(fulfilledTimestamp)='null' OR fulfilledTimestamp='' THEN NULL ELSE PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', fulfilledTimestamp) END AS fulfilledTimestamp
      - fulfilledTransactionId
      - CASE WHEN createTimestamp IS NULL OR LOWER(createTimestamp)='null' OR createTimestamp='' THEN CURRENT_TIMESTAMP() ELSE PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', createTimestamp) END AS createTimestamp
      - createUserId
      - CASE WHEN updateTimestamp IS NULL OR LOWER(updateTimestamp)='null' OR updateTimestamp='' THEN NULL ELSE PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', updateTimestamp) END AS updateTimestamp
      - updateUserId
      - eventType
    insert_values:
      - S.offerFulfillmentId
      - S.accountId
      - S.tsysAccountId
      - S.offerTriggerId
      - PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', S.periodStartTimestamp)
      - PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', S.periodEndTimestamp)
      - S.trackerType
      - S.status
      - S.currentValue
      - S.targetValue
      - S.points
      - CASE WHEN S.fulfilledTimestamp IS NULL OR LOWER(S.fulfilledTimestamp)='null' OR S.fulfilledTimestamp='' THEN NULL ELSE PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', S.fulfilledTimestamp) END
      - S.fulfilledTransactionId
      - CASE WHEN S.createTimestamp IS NULL OR LOWER(S.createTimestamp)='null' OR S.createTimestamp='' THEN CURRENT_TIMESTAMP() ELSE PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', S.createTimestamp) END
      - S.createUserId
      - CASE WHEN S.updateTimestamp IS NULL OR LOWER(S.updateTimestamp)='null' OR S.updateTimestamp='' THEN NULL ELSE PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', S.updateTimestamp) END
      - S.updateUserId
      - S.eventType
  merge:
    join_columns:
      - from_column: T.offerFulfillmentId
        to_column: S.offerFulfillmentId

