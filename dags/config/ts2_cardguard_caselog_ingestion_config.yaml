ts2_cardguard_caselog_full_file_loading:
  job_size: large
  source_bucket: tsys-inbound-pcb
  processing_bucket: pcb-{env}-staging
  processing_bucket_config: pcb-{env}-staging-artifacts
  processing_bucket_extract: pcb-{env}-staging-extract
  file_prefix: tsys_pcb_crdg_caselog
  spark:
    jar_file_uris:
      - gs://pcb-{env}-staging-artifacts/jarfiles/tsys-spark-batch-2.0.0.jar
    main_class: com.pcb.batch.spark.tsys.TsysSparkBatchApplication
    filtering_job_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      pcb.tsys.processor.datafile.type: CARDGUARD_CASELOG
      pcb.tsys.processor.filtering: true
    parsing_job_args:
      pcb.tsys.processor.datafile.path: _tempplaceholder
      pcb.tsys.processor.datafile.type: CARDGUARD_CASELOG
      pcb.tsys.processor.output.format: parquet
      pcb.tsys.processor.output.path: _tempplaceholder
    segment_dependency_groups:
      - group_name: trailer_group
        segments: TRLR
      - group_name: detail_group
        segments: CGC_D_REC
    segment_args:
      CGC_D_REC:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_crdg_caselog/CGCD.CPY
        pcb.tsys.processor.layout.name: CGC_D_REC
        pcb.tsys.processor.segment.name: CGC_D_REC
      TRLR:
        pcb.tsys.processor.copybook.path: gs://pcb-{env}-staging-artifacts/copybooks/tsys_crdg_caselog/CGCT.CPY
        pcb.tsys.processor.layout.name: CGC_T_REC
        pcb.tsys.processor.segment.name: CGC_T_REC
  bigquery:
    project_id: pcb-{env}-landing
    dataset_id: domain_fraud
    data_load_type: APPEND_ONLY
    tables:
      CGC_D_REC:
        table_name: CARDGUARD_CASELOG
        clustering_fields:
          - ACCOUNT_NUMBER
        add_columns:
          - CURRENT_TIMESTAMP() AS REC_LOAD_TIMESTAMP
      TRLR:
        table_name: CARDGUARD_CASELOG_TRLR
        add_columns:
          - CURRENT_DATETIME('America/Toronto') AS REC_LOAD_TIMESTAMP