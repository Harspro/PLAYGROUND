    task_type: SQL_EXTRACT_BQ_TO_BQ
    task_param:
        script_path: fee_reversal/sql/trans9_create_transmit_trailer_file_view.sql
  - task_name: save_transmit_trailer_to_landing
    task_type: SQL_EXTRACT_BQ_TO_BQ
    task_param:
        script_path: fee_reversal/sql/trans10_save_transmit_trailer_to_landing.sql