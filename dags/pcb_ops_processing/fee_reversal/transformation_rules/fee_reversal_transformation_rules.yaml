    task_type: SQL_EXTRACT_BQ_TO_BQ
    task_param:
        script_path: fee_reversal/sql/trans1_create_cif_active_card_view.sql
  - task_name: create_detail_data_view
    task_type: SQL_EXTRACT_BQ_TO_BQ
    task_param:
        script_path: fee_reversal/sql/trans2_create_detail_data_view.sql
  - task_name: create_detail_file_view
    task_type: SQL_EXTRACT_BQ_TO_BQ
    task_param:
        script_path: fee_reversal/sql/trans3_create_detail_file_view.sql
  - task_name: save_detail_to_landing
    task_type: SQL_EXTRACT_BQ_TO_BQ
    task_param:
