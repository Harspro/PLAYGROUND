# # # ######### PROD #########

### Terraform stages for Processing in PROD
tf-plan-prod-processing:
  image: ${JFROG_GAMMA}/pcb-dp-docker-prod/build/google/gcp-terragrunt:v2026.3.0
  id_tokens:
    TERRAFORM_VAULT_AUTH_JWT:
      aud: "https://web-vault.octopus.azure.prod.pcfcloud.io"
  extends:
    - .vault-auth
    - .google-oidc:auth    
  script:
    - |
      set +e
      export TF_CLI_CONFIG_FILE=$CI_PROJECT_DIR/terraformrc
      cd ${ENV_DIR}
      # Fail early if Slack webhook is missing
      if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
        echo "ERROR: SLACK_WEBHOOK_URL CI/CD variable is not set. Add it in Settings > CI/CD > Variables."
        exit 1
      fi
      terragrunt plan -out=tfplan -detailed-exitcode
      export TF_EXIT_CODE=$?
      set -e
      echo "$TF_EXIT_CODE"
      # Fail the job if TF_EXIT_CODE is neither 0 nor 2
      if [ "$TF_EXIT_CODE" -ne 0 ] && [ "$TF_EXIT_CODE" -ne 2 ]; then
        echo "Error: Unexpected exit code $TF_EXIT_CODE"
        curl -X POST --data-urlencode "payload={
          \"channel\": \"$GITLAB_PIPELINE_CHANNEL\",
          \"text\": \"Pipeline Status\",
          \"attachments\": [
            {
              \"text\": \"Failed: The pipeline job fails for processing zone deployment. Job URL: ${CI_JOB_URL}\",
              \"color\": \"danger\"
            }
          ]
        }" "$SLACK_WEBHOOK_URL"
        exit 1
      fi
      chmod -R a+r $CI_PROJECT_DIR
      echo "Permissions updated for .terragrunt-cache before artifact upload"
  stage: tfplan-processing
  environment: prod
  variables:
    ENV_DIR: "live/Prod/02_processing/"
    ENV_NAME: "prod"
    PROJECT_ID: "pcb-prod-processing"
    VAULT_SERVER_URL:
      value: $VAULT_AZURE_GAMMA
  artifacts:
    paths:
      - ${ENV_DIR}/.terragrunt-cache/
      - ${ENV_DIR}/.terraform.lock.hcl
      - ${ENV_DIR}/tfplan
    expire_in: 1 hrs
  dependencies:
    - tf-plan-uat-processing
  only:
    - merge_requests
    - main
    - /^release.*$/
  tags:
    - pcf
    - azure
    - prod  

