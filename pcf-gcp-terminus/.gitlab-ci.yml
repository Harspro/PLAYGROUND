stages:
  - init
  - tfplan-processing
  - tfapply-processing
  - tfplan-curated
  - tfapply-curated
  - tfplan-landing
  - tfapply-landing

include:
  - project: 'loblaw/pc-financial/pcf-engineering/shared/cicd/gitlab-pipelines-library'
    ref: ${CI_LIBRARY_VERSION}
    file:
      - '/gitlab-ci/gcp/gcp_auth.yml'
      - '/gitlab-ci/default.yml'
      - '/gitlab-ci/hashicorp-vault/vault-gitlab-auth-base.yml'

default:
  tags:
    - pcf
    - azure
    - nonprod

variables:
  TECHOPS_OPERATOR_AUTHORIZED_USERS: "abhijit.ghogare,aditya.gorthi,vaibhav.patil,tallapally.yeshwanthgoud,sharon.ajith,raj.suwalka,radhika.solanki,nishant.waghela,manisha.lalwani,dipayan.mallick,vikas.singh,sejal.zade,atyajit.ashoklande,narkar.pritesh,manoj.malapati,himanshu.shekher,nithya.basavanna,aneesha.shaik,anuhya.sunchikala,amit.shah"
  DEV_SLACK_CHANNEL: "#gcp-dev-alerts"
  UAT_SLACK_CHANNEL: "#gcp-uat-alerts"
  PROD_SLACK_CHANNEL: "#gcp-prod-alerts"
  GITLAB_PIPELINE_CHANNEL: "#gitlab-pipeline-alerts"
  DOWNLOAD_EXTERNAL_MODULES: "true"
  WI_POOL_PROVIDER: "//iam.googleapis.com/projects/$GCP_WI_FEDERATION_PROJECT/locations/global/workloadIdentityPools/gitlab-oidc-platform/providers/gitlab-oidc-platform-terminus"
  SERVICE_ACCOUNT: "infra-admin-sa@$PROJECT_ID.iam.gserviceaccount.com"
  AUDIENCE: "https://gitlab.lblw.ca"
  VAULT_ENV_DEBUG: true
  VAULT_AUTH_ROLE:
    value: gitlab-ci-platforms-gcp-terminus

.vault-auth:
  stage: deploy
  id_tokens:
    VAULT_TOKEN:
      aud: $VAULT_SERVER_URL
  secrets:
    SLACK_WEBHOOK_URL:
      vault: pcf-engineering/platforms/pcf-gcp-management/pcf-terminus/pcf-gcp-terminus/SLACK_WEBHOOK_URL@gitlab-pipeline-secrets
      file: false
      token: $VAULT_TOKEN

# Terraform stages for Processing in Dev
tf-plan-dev-processing:
  image: ${JFROG_BETA}/docker/build/google/gcp-terragrunt:v2026.3.0
  id_tokens:
    TERRAFORM_VAULT_AUTH_JWT:
      aud: "https://web-vault.dolphin.azure.nonprod.pcfcloud.io"
  extends:
    - .vault-auth
    - .google-oidc:auth
  script:
    - |
      set +e
      export TF_CLI_CONFIG_FILE=$CI_PROJECT_DIR/terraformrc
      cd ${ENV_DIR}
      # Fail early if Slack webhook is missing
      if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
        echo "ERROR: SLACK_WEBHOOK_URL CI/CD variable is not set. Add it in Settings > CI/CD > Variables."
        exit 1
      fi
      terragrunt plan -out=tfplan -detailed-exitcode
      export TF_EXIT_CODE=$?
      set -e
      echo "$TF_EXIT_CODE"
      # Fail the job if TF_EXIT_CODE is neither 0 nor 2
      if [ "$TF_EXIT_CODE" -ne 0 ] && [ "$TF_EXIT_CODE" -ne 2 ]; then
        echo "Error: Unexpected exit code $TF_EXIT_CODE"
        curl -X POST --data-urlencode "payload={
          \"channel\": \"$GITLAB_PIPELINE_CHANNEL\",
          \"text\": \"Pipeline Status\",
          \"attachments\": [
            {
              \"text\": \"Failed: The pipeline job fails for Processing zone deployment. Job URL: ${CI_JOB_URL}\",
              \"color\": \"danger\"
            }
          ]
        }" "$SLACK_WEBHOOK_URL"
        exit 1
      fi
      chmod -R a+r $CI_PROJECT_DIR
      echo "Permissions updated for .terragrunt-cache before artifact upload"
  stage: tfplan-processing
  environment: nonprod
  variables:
    ENV_DIR: "live/Dev/02_processing/"
    ENV_NAME: "dev"
    PROJECT_ID: "pcb-dev-processing"
  artifacts:
    paths:
      - ${ENV_DIR}/.terragrunt-cache/
      - ${ENV_DIR}/.terraform.lock.hcl
      - ${ENV_DIR}/tfplan
    expire_in: 1 hrs
  only:
    - merge_requests
    - main

tf-apply-dev-processing:
  image: ${JFROG_BETA}/docker/build/google/gcp-terragrunt:v2026.3.0
  id_tokens:
    TERRAFORM_VAULT_AUTH_JWT:
      aud: "https://web-vault.dolphin.azure.nonprod.pcfcloud.io"
  extends:
    - .vault-auth
    - .google-oidc:auth    
  script:
    - |
      set +e
      export TF_CLI_CONFIG_FILE=$CI_PROJECT_DIR/terraformrc
      cd ${ENV_DIR}
      # Fail early if Slack webhook is missing
      if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
        echo "ERROR: SLACK_WEBHOOK_URL CI/CD variable is not set. Add it in Settings > CI/CD > Variables."
        exit 1
      fi
      terragrunt apply tfplan
      export TF_EXIT_CODE=$?
      set -e
      if [ "$TF_EXIT_CODE" -eq 0 ]; then
        curl -X POST --data-urlencode "payload={
          \"channel\": \"$DEV_SLACK_CHANNEL\",
          \"text\": \"Pipeline Status\",
          \"attachments\": [
            {
              \"text\": \"Success: The pipeline job success for processing zone deployment. Job URL: ${CI_JOB_URL}\",
              \"color\": \"good\"
            }
          ]
        }" "$SLACK_WEBHOOK_URL"
      else
        curl -X POST --data-urlencode "payload={
          \"channel\": \"$DEV_SLACK_CHANNEL\",
          \"text\": \"Pipeline Status\",
          \"attachments\": [
            {
              \"text\": \"Failed: The pipeline job failed at processing zone deployment. Job URL: ${CI_JOB_URL}\",
              \"color\": \"danger\"
            }
          ]
        }" "$SLACK_WEBHOOK_URL"
        exit 1
      fi
  stage: tfapply-processing
  environment: nonprod 
  variables:
    ENV_DIR: "live/Dev/02_processing/"
    ENV_NAME: "dev"
    PROJECT_ID: "pcb-dev-processing"
    VAULT_SERVER_URL:
      value: $VAULT_AZURE_BETA
  dependencies:
    - tf-plan-dev-processing
  only:
    - main
  when: manual

